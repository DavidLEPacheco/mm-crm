name: Daily pipeline (scrape + deploy)

# Runs the full scrape -> inject -> wash -> fill pipeline on a schedule, refreshes
# index.html, and publishes to GitHub Pages. Replaces the manual run on a laptop.
#
# Requires repo secret GMAIL_APP_PASSWORD (Settings -> Secrets and variables ->
# Actions). Trigger manually any time via the "Run workflow" button.

on:
  schedule:
    # 20:00 UTC daily ~= 06:00 Sydney (AEST, UTC+10). During Sydney DST
    # (AEDT, UTC+11, ~Oct-Apr) this lands at 07:00 — fine for a morning run.
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write   # commit the refreshed index.html
  pages: write      # publish to GitHub Pages
  id-token: write   # Pages deploy auth

concurrency:
  group: pages      # shared with deploy.yml so Pages deploys never overlap
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements.txt
          python -m playwright install --with-deps chromium

      # Interim state continuity (scraper caches / first-seen). Becomes
      # unnecessary once the data lives in Supabase. Rolling cache: unique save
      # key + prefix restore-key always restores the most recent.
      - name: Restore pipeline state
        uses: actions/cache@v4
        with:
          path: |
            pipeline/*.json
            pipeline/scripts/*.json
          key: pipeline-state-${{ github.run_id }}
          restore-keys: |
            pipeline-state-

      # The master HTML is gitignored, so it isn't in the checkout. The deployed
      # index.html IS the latest master (it's a copy), so seed from it.
      - name: Seed master HTML from deployed index.html
        run: cp index.html pipeline/mazar_martin_app.html

      - name: Run pipeline (scrape -> inject -> wash -> fill)
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PYTHONUTF8: '1'
        run: python pipeline/scripts/run_pipeline.py --no-deploy

      - name: Copy refreshed master to index.html
        run: cp pipeline/mazar_martin_app.html index.html

      - name: Commit refreshed index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No change to index.html — skipping commit"
          else
            git commit -m "Daily update $(date -u '+%d %b %Y %H:%M') UTC"
            git push
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
